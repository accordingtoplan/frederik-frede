<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MiaD — Work</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --grey-dark:#4a4540; --grey-mid:#7a7470; --grey-light:#a8a39f; --border:#c8c3be; --bg:#fff; }
body { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--grey-dark); }

.nav { display:flex; justify-content:space-between; align-items:center; padding:18px 24px;  }
.nav-logo { font-size:13px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--grey-dark); text-decoration:none; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }
.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a { font-size:12px; font-weight:400; color:var(--grey-mid); text-decoration:none; }
.nav-links a:hover, .nav-links a.active { color:var(--grey-dark); }

.page-header { padding:48px 24px 40px;  display:flex; justify-content:space-between; align-items:flex-end; }
.page-title { font-size:clamp(40px,7vw,80px); font-weight:700; line-height:0.95; letter-spacing:-0.03em; color:var(--grey-dark); }
.page-desc { font-size:clamp(16px,2vw,26px); font-weight:700; line-height:1.3; max-width:800px; color:var(--grey-mid); letter-spacing:-0.01em; margin-top:16px; }

.section-header { display:flex; justify-content:space-between; align-items:center; padding:14px 24px;   }
.section-label { font-size:11px; font-weight:400; letter-spacing:0.09em; text-transform:uppercase; color:var(--grey-mid); }
.section-count { font-size:11px; color:var(--grey-light); }

/* GRID */
.grid { display:flex; flex-direction:column; gap:1px; background:transparent; }
.ci { background:var(--bg); display:block; text-decoration:none; overflow:hidden; cursor:pointer; }
.ciw { width:100%; overflow:hidden; background:#ede9e5; position:relative; }
.ciw img, .ciw video { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
.ci:hover .ciw img, .ci:hover .ciw video { transform:scale(1.03); }
.ci.p .ciw { aspect-ratio:4/5; }
.ci.l .ciw { aspect-ratio:5/4; }
.ci.sq .ciw { aspect-ratio:1/1; }

.ci.full .ciw { aspect-ratio:21/8; }
.ci.architonic .ciw { aspect-ratio:8/5; }
.cm { padding:13px 24px 20px; display:flex; justify-content:space-between; align-items:baseline; }
.cb { font-size:12px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--grey-dark); }
.ct { font-size:11px; color:var(--grey-light); }

/* PLACEHOLDER */
.placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#e8e4e0; }
.placeholder span { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--grey-light); }

/* VITRA CAROUSEL */
.carousel-wrap { position:relative; width:100%; overflow:hidden; }
.carousel-track { display:flex; transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94); }
.carousel-track img { width:100%; flex-shrink:0; height:100%; object-fit:cover; display:block; }
.carousel-btn { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.85); border:none; cursor:pointer; width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--grey-dark); z-index:2; transition:background 0.15s; }
.carousel-btn:hover { background:#fff; }
.carousel-btn.prev { left:12px; }
.carousel-btn.next { right:12px; }
.carousel-dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.5); cursor:pointer; transition:background 0.2s; }
.dot.active { background:#fff; }

/* FOOTER */
.footer { display:grid; grid-template-columns:1fr 1fr 1fr;  }
.footer-col { padding:32px 24px;  }
.footer-col:last-child { border-right:none; }
.footer-label { font-size:11px; font-weight:400; letter-spacing:0.09em; text-transform:uppercase; color:var(--grey-light); margin-bottom:12px; }
.footer-val { font-size:13px; color:var(--grey-mid); line-height:1.7; }
.footer-val a { color:var(--grey-mid); text-decoration:none; }
.footer-val a:hover { color:var(--grey-dark); }
.footer-bottom { padding:20px 24px;  display:flex; justify-content:space-between; }
.footer-copy { font-size:11px; color:var(--grey-light); }

/* NAV — Alright style */
.nav {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 24px;
  border-bottom:none;
  position:sticky; top:0; background:var(--bg); z-index:100;
}
.nav-left { display:flex; align-items:baseline; }
.nav-logo { font-size:13px; font-weight:700; letter-spacing:0.01em; color:var(--grey-dark); text-decoration:none; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }
.nav-studio { font-size:13px; font-weight:400; color:var(--grey-mid); text-decoration:none; }
.nav-links { display:flex; gap:0; list-style:none; align-items:center; }
.nav-links li { display:inline; }
.nav-links li::after { content:","; font-size:12px; color:var(--grey-light); margin-right:6px; }
.nav-links li:last-child::after { content:""; margin-right:0; }
.nav-links a { font-size:12px; font-weight:400; color:var(--grey-mid); text-decoration:none; letter-spacing:0.01em; margin-right:6px; }
.nav-links a:hover { color:var(--grey-dark); }
.nav-links a.active { font-weight:700; color:var(--grey-dark); }
.hamburger { display:none; }

/* FOOTER — Alright style */
.footer-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:20px 24px;
  
}
.footer-copy { font-size:12px; color:var(--grey-light); }
.footer-links { display:flex; gap:16px; }
.footer-links a { font-size:12px; color:var(--grey-mid); text-decoration:none; }
.footer-links a:hover { color:var(--grey-dark); }

/* ── MOBILE ──────────────────────────────────────────────── */
@media (max-width: 640px) {

  /* Nav */
  .nav { padding:14px 16px; position:relative; }
  .nav-links { display:none; }
  .nav-links.open {
    display:flex; flex-direction:column;
    position:absolute; top:100%; left:0; right:0;
    background:var(--bg);
    padding:12px 16px 20px;
    gap:0;
    z-index:200;
  }
  .nav-links.open li { display:block; }
  .nav-links.open li::after { display:none; }
  .nav-links.open a { display:block; font-size:15px; padding:11px 0; margin:0; border-bottom:none; color:var(--grey-mid); }
  .nav-links.open a.active { color:var(--grey-dark); }
  .hamburger { display:flex; flex-direction:column; gap:5px; cursor:pointer; padding:4px; background:none; border:none; }
  .hamburger span { display:block; width:22px; height:1.5px; background:var(--grey-dark); }

  /* Page header — stack title + desc */
  .page-header { flex-direction:column; align-items:flex-start; padding:32px 16px 28px; gap:12px; }

  /* Work grid rows → single column */
  #work-grid > div {
    grid-template-columns: 1fr !important;
  }
  /* Restore portrait aspect ratio when single-col */
  #work-grid .ci .ciw,
  #work-grid > div .ciw { aspect-ratio: 4/5 !important; }
  /* But landscape/wider cells look better at 16/9 single col */
  #work-grid > div[data-cols="3"] .ciw { aspect-ratio: 16/9 !important; }

  /* Section header */
  .section-header { padding:12px 16px; }

  /* Meta */
  .cm { padding:10px 16px 16px; }

  /* Footer */
  .footer-bar { padding:16px 16px; }

}

</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a class="nav-logo" href="/miad-studio/">MiaD</a><a class="nav-studio" href="/miad-studio/about.html">&nbsp;Studio</a>
  </div>
  <ul class="nav-links">
    <li><a href="/miad-studio/">Home</a></li>
    <li><a href="/miad-studio/work.html" class="active">Work</a></li>
    <li><a href="/miad-studio/about.html">Information</a></li>
    <li><a href="/miad-studio/about.html#contact">Contact</a></li>
  </ul>
  <button class="hamburger" id="hbg" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span>
  </button>
</nav>

<div class="page-header">
  <h1 class="page-title">Work</h1>
  <p class="page-desc">Selected projects across brand strategy, creative direction, AI integration, and digital transformation.</p>
</div>

<div>
  <div class="section-header">
    <span class="section-label">All Projects</span>
    <span class="section-count" id="proj-count"></span>
  </div>
  <div class="grid" id="work-grid"></div>
</div>

<div class="footer-bar">
  <span class="footer-copy">© 2026 <span style="font-family:'UnifrakturMaguntia',serif;font-size:13px;">MiaD</span></span>
  <div class="footer-links">
    <a href="#">Instagram</a>
    <a href="#">LinkedIn</a>
  </div>
</div>

<script>
const VITRA_IMGS = [
  "https://static.vitra.com/media/asset/979518/storage/v_fullbleed_1440x/15702284.jpg",
  "https://static.vitra.com/media/asset/732547/storage/v_fullbleed_1440x/09055959.jpg",
  "https://static.vitra.com/media/asset/2492031/storage/v_fullbleed_1440x/36836346.jpg",
  "https://static.vitra.com/media/asset/1685925/storage/v_fullbleed_1440x/21005339.jpg",
  "https://static.vitra.com/media/asset/1553003/storage/v_fullbleed_1440x/16993902.jpg",
  "https://static.vitra.com/products/41218500/LCH_41218500.LCH_MAS_01=02;LCH_41218500.LCH_VAN_01=05;LCH_41218500.LCH_COV_01=0075;LCH_41218500.BZF_LPF_01=66;LCH_41218500.LCH_BAS_01=02;LCH_41218500.LCH_BAS_ON_01=05;LCH_41218500.WPROMO_25_LCH=01;LCH_41218500.ZV99999_CHR_PAC01=K001.png"
];

const projects = [
  { b:"Louis Vuitton",      t:"Employer Branding",
    type:"video", src:"https://www.freundevonfreunden.com/app/uploads/louis-vuitton/v2_lv_graded_render_h264-Original_Sub_02_2.mp4",
    poster:"https://www.freundevonfreunden.com/app/uploads/louis-vuitton-a-global-employer-branding-campaign-and-extended-work-culture-documentary/Friends-of-Friends-LV-WorkshopsCreation-0392.jpg" },
  { b:"Dauphin",            t:"Go-to-Market",
    type:"img", src:"https://dacoql.wpenginepowered.com/wp-content/uploads/2026/01/averio-PLP_main.jpg" },
  { b:"Vitra",              t:"Brand Strategy",          type:"carousel" },
  { b:"HAY",                t:"Creative Direction",
    type:"img", src:"https://www.hay.com/globalassets/media/brandsite/hays-world/news/2018-milan-design-week/no-setup-milan-2018.jpg?w=1400" },
  { b:"Sonos",              t:"Brand & Content",
    type:"img", src:"https://media.sonos.com/images/znqtjj88/production/12bfad13c968850e7b5795545773ce893fede974-2440x2440.jpg?w=1080&q=100&fit=clip&auto=format" },
  { b:"NZZ",                t:"Brand & Digital",
    type:"img", src:"https://assets01.sdd1.ch/assets/lbwp-cdn/nzz-mediengruppe-v2/files/1715781184/nzzde_front_gerollt_21.png" },
  { b:"Architonic",         t:"Platform Strategy",
    type:"img", src:"https://media.architonic.com/system-on/homer/architonic.jpg?width=1256&height=862&fit=inside&crop=true&format=webp" },
  { b:"Frederik G. Pferdt", t:"Brand & Identity",
    type:"video", src:"https://www.moresleep.net/wp-content/uploads/2024/11/Frederik-Pferdt-Venue-Screen-Video.mp4",
    poster:"https://www.moresleep.net/wp-content/uploads/2023/10/IG-FGP-01-scaled.jpg" },
  { b:"Lewis",              t:"Brand & Digital",
    type:"video", src:"https://lewisgroupofcompanies.com/wp-content/uploads/2023/08/Home_header-final.mp4",
    poster:"https://www.moresleep.net/wp-content/uploads/2024/09/Lewis-Billboard_Nature-Mockup-1024x683.jpg" },
  { b:"LAS Art Foundation", t:"Branding & Motion",
    type:"video", src:"https://cdn.prod.website-files.com/65c5074d380afa8c0d0482af/65dc782cb4e5798707ac738e_LAS Digital Posters Final Animation-transcode.mp4", poster:"" },
  { b:"USM",                t:"Digital Transformation", type:"vimeo", src:"1048609984" },
  { b:"Thonet",             t:"Brand Narrative",
    type:"img", src:"https://www.thonet.de/fileadmin/media/07-magazine/reference/Solo_Houses/thonet-solo-house-533px_02.jpg" },
  { b:"Friends of Friends", t:"Publication & Brand",
    type:"img", src:"https://www.moresleep.net/wp-content/uploads/2021/02/FF-Personalities.gif" },
  { b:"Pernod Ricard",      t:"Hospitality & Brand",
    type:"img", src:"https://www.moresleep.net/wp-content/uploads/2021/12/Header-Image-HP-1024x565.jpg" },
  { b:"&Tradition",         t:"Creative Direction",      type:"placeholder" },
  { b:"Tylko",              t:"Digital",                 type:"placeholder" },
  { b:"Ruinart",            t:"Brand & Content",         type:"placeholder" },
  { b:"BMW",                t:"Creative Direction",      type:"placeholder" },
  { b:"Ritz Carlton",       t:"Hospitality & Brand",     type:"placeholder" },
];

const G = document.getElementById('work-grid');
let i = 0, rowIdx = 0;

while (i < projects.length) {
  const cols = (rowIdx % 2 === 0) ? 2 : 3;
  const row = projects.slice(i, i + cols);
  i += cols;
  rowIdx++;

  const rowDiv = document.createElement('div');
  rowDiv.style.cssText = `display:grid;grid-template-columns:repeat(${cols},1fr);gap:1px;background:var(--border);margin-bottom:1px;`;
  rowDiv.setAttribute('data-cols', cols);

  row.forEach(p => {
    const a = document.createElement('a');
    a.className = 'ci';
    a.href = '#';
    const ar = cols === 2 ? '4/5' : '5/4';
    const id = p.b.replace(/[^a-z0-9]/gi,'');
    let media = '';

    if (p.type === 'carousel') {
      media = `<div style="position:relative;overflow:hidden;aspect-ratio:${ar};width:100%;">
        <div id="ct${id}" style="display:flex;height:100%;transition:transform 0.5s ease;">
          ${VITRA_IMGS.map(img=>`<img src="${img}" alt="Vitra" style="min-width:100%;height:100%;object-fit:cover;flex-shrink:0;"/>`).join('')}
        </div>
        <button class="carousel-btn prev" onclick="slide(event,'${id}',-1)">&#8592;</button>
        <button class="carousel-btn next" onclick="slide(event,'${id}',1)">&#8594;</button>
        <div class="carousel-dots" id="cd${id}">
          ${VITRA_IMGS.map((_,n)=>`<div class="dot${n===0?' active':''}" onclick="goTo(event,'${id}',${n})"></div>`).join('')}
        </div>
      </div>`;
    } else if (p.type === 'placeholder') {
      media = `<div style="aspect-ratio:${ar};display:flex;align-items:center;justify-content:center;background:#e8e4e0;"><span style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey-light);">${p.b}</span></div>`;
    } else if (p.type === 'video') {
      media = `<div style="aspect-ratio:${ar};overflow:hidden;"><video autoplay muted loop playsinline poster="${p.poster||''}" style="width:100%;height:100%;object-fit:cover;display:block;"><source src="${p.src}" type="video/mp4"></video></div>`;
    } else if (p.type === 'vimeo') {
      media = `<div style="aspect-ratio:${ar};overflow:hidden;position:relative;"><iframe src="https://player.vimeo.com/video/${p.src}?autoplay=1&muted=1&loop=1&background=1&autopause=0" frameborder="0" allow="autoplay;fullscreen" style="width:100%;height:100%;position:absolute;top:0;left:0;"></iframe></div>`;
    } else {
      media = `<div style="aspect-ratio:${ar};overflow:hidden;"><img src="${p.src}" alt="${p.b}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentElement.style.background='#e4e0db';this.style.display='none'"/></div>`;
    }

    a.innerHTML = media + `<div class="cm"><span class="cb">${p.b}</span><span class="ct">${p.t}</span></div>`;
    rowDiv.appendChild(a);
  });

  G.appendChild(rowDiv);
}

// Carousel
const carouselState = {};
function slide(e,id,dir){e.preventDefault();const n=VITRA_IMGS.length;carouselState[id]=(( carouselState[id]||0)+dir+n)%n;updateCarousel(id);}
function goTo(e,id,i){e.preventDefault();carouselState[id]=i;updateCarousel(id);}
function updateCarousel(id){const t=document.getElementById('ct'+id);const d=document.getElementById('cd'+id);const i=carouselState[id]||0;t.style.transform=`translateX(-${i*100}%)`;d.querySelectorAll('.dot').forEach((dot,idx)=>dot.classList.toggle('active',idx===i));}
</script>
</body>
</html>
