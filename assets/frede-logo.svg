  <rect x="72" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="82" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="92" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="102" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="112" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="122" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="132" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="142" y="115" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="152" y="115" width="14" height="6" rx="1" fill="currentColor"/>

  <!-- Key rows — row 2 (13 keys + wide) -->
  <rect x="22" y="123" width="12" height="6" rx="1" fill="currentColor"/>
  <rect x="36" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="46" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="56" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="66" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="76" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="86" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="96" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="106" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="116" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="126" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="136" y="123" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="146" y="123" width="20" height="6" rx="1" fill="currentColor"/>

  <!-- Key rows — row 3 (spacebar area) -->
  <rect x="22" y="131" width="16" height="6" rx="1" fill="currentColor"/>
  <rect x="40" y="131" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="50" y="131" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="60" y="131" width="8" height="6" rx="1" fill="currentColor"/>
  <rect x="70" y="131" width="52" height="6" rx="1" fill="currentColor"/>
