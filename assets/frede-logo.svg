  <rect x="144" y="131" width="6" height="6" rx="1" fill="currentColor"/>
  <rect x="152" y="131" width="6" height="6" rx="1" fill="currentColor"/>
  <rect x="160" y="131" width="6" height="6" rx="1" fill="currentColor"/>

  <!-- Trackpad -->
  <rect x="80" y="141" width="40" height="8" rx="3" ry="3" fill="var(--bg)"/>
  <rect x="86" y="150" width="28" height="4" rx="2" ry="2" fill="var(--bg)"/>
