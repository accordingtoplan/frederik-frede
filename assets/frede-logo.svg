<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="currentColor">
  <!-- Screen -->
  <rect x="20" y="2" width="160" height="100" rx="10" ry="10"/>
  <!-- Screen inner (cutout) -->
  <rect x="26" y="8" width="148" height="88" rx="6" ry="6" fill="var(--bg)"/>
  <!-- FRE text -->
  <text x="36" y="58" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="44" fill="currentColor" letter-spacing="-1">FRE</text>
  <!-- DE™ text -->
  <text x="36" y="92" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="44" fill="currentColor" letter-spacing="-1">DE&#x2122;</text>

  <!-- Keyboard base -->
  <rect x="14" y="108" width="172" height="46" rx="8" ry="8"/>
  <!-- Keyboard inner -->
  <rect x="20" y="113" width="160" height="28" rx="3" ry="3" fill="var(--bg)"/>

  <!-- Key rows — row 1 (14 keys) -->
