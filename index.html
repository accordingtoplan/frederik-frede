<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    :root {
      --grey-dark:  #4a4540;
      --grey-mid:   #7a7470;
      --grey-light: #a8a39f;
      --border:     #c8c3be;
      --bg:         #fff;
    }
    body { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--grey-dark); }

    /* ── NAV ── */
    .nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 24px;
      position:sticky; top:0; background:var(--bg); z-index:100;
    }
    .nav-left { display:flex; align-items:baseline; }
    .nav-logo { font-size:13px; font-weight:700; letter-spacing:0.01em; color:var(--grey-dark); text-decoration:none; }
    .nav-studio { font-size:13px; font-weight:400; color:var(--grey-mid); text-decoration:none; }
    .nav-links { display:flex; gap:0; list-style:none; align-items:center; }
    .nav-links li { display:inline; }
    .nav-links li::after { content:","; font-size:12px; color:var(--grey-light); margin-right:6px; }
    .nav-links li:last-child::after { content:""; margin-right:0; }
    .nav-links a { font-size:12px; font-weight:400; color:var(--grey-mid); text-decoration:none; letter-spacing:0.01em; margin-right:6px; }
    .nav-links a:hover { color:var(--grey-dark); }
    .nav-links a.active { font-weight:700; color:var(--grey-dark); }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; background:none; border:none; }
    .hamburger span { display:block; width:22px; height:1.5px; background:var(--grey-dark); }

    /* ── HERO ── */
    .hero { padding:56px 24px 48px; }
    .hero-headline { font-size:clamp(64px,11vw,130px); font-weight:700; line-height:0.91; letter-spacing:-0.03em; color:var(--grey-dark); margin-bottom:44px; }
    .hero-sub { display:flex; justify-content:space-between; align-items:flex-end; gap:40px; }
    .hero-desc { font-size:clamp(16px,2vw,26px); font-weight:700; line-height:1.3; max-width:800px; color:var(--grey-mid); letter-spacing:-0.01em; }
    .hero-cta { display:flex; gap:12px; align-items:center; flex-shrink:0; }

    /* ── BUTTONS ── */
    .btn-p { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; display:inline-flex; align-items:center; font-size:14px; color:#fff; background:var(--grey-dark); border-radius:980px; padding:11px 24px; text-decoration:none; border:1px solid var(--grey-dark); line-height:1.4; white-space:nowrap; transition:background 0.15s; }
    .btn-p:hover { background:var(--grey-mid); border-color:var(--grey-mid); }
    .btn-s { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; display:inline-flex; align-items:center; font-size:14px; color:var(--grey-dark); background:transparent; border-radius:980px; padding:11px 24px; text-decoration:none; border:1px solid var(--grey-dark); line-height:1.4; white-space:nowrap; transition:border-color 0.15s; }
    .btn-s:hover { border-color:var(--grey-mid); color:var(--grey-mid); }
    .btn-s::after { content:' ›'; font-size:16px; }

    /* ── PROJECT LIST (homepage, stacked Alright style) ── */
    .project-list { width:100%; }
    .project-item { display:block; text-decoration:none; color:var(--grey-dark); }
    .project-item.landscape .img-wrap { width:100%; overflow:hidden; aspect-ratio:16/9; position:relative; }
    .project-item.portrait { padding:48px 0; }
    .project-item.portrait .img-wrap { width:35%; margin:0 auto; overflow:hidden; aspect-ratio:4/5; }
    .project-item.square { padding:40px 0; }
    .project-item.square .img-wrap { width:42%; margin:0 auto; overflow:hidden; aspect-ratio:1/1; }
    .img-wrap img, .img-wrap video { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
    .project-item:hover .img-wrap img,
    .project-item:hover .img-wrap video { transform:scale(1.02); }
    .project-meta { display:flex; justify-content:space-between; align-items:baseline; padding:12px 24px 16px; }
    .project-brand { font-size:12px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--grey-dark); }
    .project-type { font-size:11px; color:var(--grey-light); }

    /* ── SECTION HEADER ── */
    .section-header { display:flex; justify-content:space-between; align-items:center; padding:14px 24px; }
    .section-label { font-size:11px; font-weight:400; letter-spacing:0.09em; text-transform:uppercase; color:var(--grey-mid); }
    .section-count { font-size:11px; color:var(--grey-light); }

    /* ── FOOTER ── */
    .footer-bar { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; }
    .footer-copy { font-size:12px; color:var(--grey-light); }
    .footer-links { display:flex; gap:16px; }
    .footer-links a { font-size:12px; color:var(--grey-mid); text-decoration:none; }
    .footer-links a:hover { color:var(--grey-dark); }

    /* ── MOBILE ── */
    @media (max-width:640px) {
      .nav { padding:14px 16px; position:relative; }
      .nav-links { display:none; }
      .nav-links.open {
        display:flex; flex-direction:column;
        position:absolute; top:100%; left:0; right:0;
        background:var(--bg); padding:12px 16px 20px; gap:0; z-index:200;
      }
      .nav-links.open li { display:block; }
      .nav-links.open li::after { display:none; }
      .nav-links.open a { display:block; font-size:15px; padding:11px 0; margin:0; color:var(--grey-mid); }
      .nav-links.open a.active { color:var(--grey-dark); }
      .hamburger { display:flex; }
      .hero { padding:32px 16px 36px; }
      .hero-sub { flex-direction:column; align-items:flex-start; gap:24px; }
      .hero-cta { flex-wrap:wrap; gap:10px; }
      .project-item.portrait .img-wrap { width:80%; }
      .project-item.portrait { padding:24px 0; }
      .project-item.square .img-wrap { width:80%; }
      .project-item.square { padding:20px 0; }
      .project-meta { padding:10px 16px 14px; }
      .section-header { padding:12px 16px; }
      .footer-bar { padding:16px; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav class="nav">
  <div class="nav-left">
    <a class="nav-logo" href="/">Your Name</a>
    <a class="nav-studio">&nbsp;Portfolio</a>
  </div>
  <ul class="nav-links">
    <li><a href="/" class="active">Home</a></li>
    <li><a href="/work.html">Work</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/about.html#contact">Contact</a></li>
  </ul>
  <button class="hamburger" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
    <span></span><span></span>
  </button>
</nav>

<!-- ── HERO ── -->
<div class="hero">
  <h1 class="hero-headline">Your Headline<br>Goes Here.</h1>
  <div class="hero-sub">
    <p class="hero-desc">One or two lines describing what you do.<br>Short. Confident. No generalist answers.</p>
    <div class="hero-cta">
      <a class="btn-p" href="/about.html#contact">Get in touch</a>
      <a class="btn-s" href="/work.html">See work</a>
    </div>
  </div>
</div>

<!-- ── PROJECTS ── -->
<div class="section-header">
  <span class="section-label">Selected Work</span>
  <span class="section-count">00</span>
</div>

<div class="project-list">

  <!-- Landscape item -->
  <a class="project-item landscape" href="#">
    <div class="img-wrap">
      <img src="your-image.jpg" alt="Project Name">
    </div>
    <div class="project-meta">
      <span class="project-brand">Project Name</span>
      <span class="project-type">Category</span>
    </div>
  </a>

  <!-- Portrait item -->
  <a class="project-item portrait" href="#">
    <div class="img-wrap">
      <img src="your-image.jpg" alt="Project Name">
    </div>
    <div class="project-meta">
      <span class="project-brand">Project Name</span>
      <span class="project-type">Category</span>
    </div>
  </a>

</div>

<!-- ── FOOTER ── -->
<div class="footer-bar">
  <span class="footer-copy">© 2026 <span style="font-family:'UnifrakturMaguntia',serif;">Your Name</span></span>
  <div class="footer-links">
    <a href="#">Instagram</a>
    <a href="#">LinkedIn</a>
  </div>
</div>

</body>
</html>
